<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Feedbacks — Quaglicar Chaveiro Automotivo</title>
    <meta
      name="description"
      content="Depoimentos e feedbacks de clientes da Quaglicar, chaveiro automotivo em Juiz de Fora/MG."

    <link rel="stylesheet" href="global.css" />
  </head>
  <body>
    <header class="cabecalho-site">
      <div class="cabecalho-conteudo">

        <nav class="menu-principal" aria-label="Menu principal">
          <ul class="menu-lista">
            <li><a class="menu-link" href="/">Início</a></li>
            <li><a class="menu-link menu-link-ativo" href="/feedbacks" aria-current="page">Feedbacks</a></li>
            <li><a class="menu-link" href="/historia">História</a></li>
            <li><a class="menu-link" href="/contato">Contato</a></li>
            <li><a class="menu-link" href="/nossa-equipe">Nossa equipe</a></li>

    </header>

    <main class="conteudo-principal">
      <h1 class="titulo-pagina">Feedbacks dos nossos clientes</h1>

      <section class="galeria-feedbacks" aria-label="Galeria de depoimentos">

          <img src="imagens/feedback-1.png" alt="Depoimento de cliente da Quaglicar" loading="lazy" />

        <figure>
          <img src="imagens/feedback-4.png" alt="Depoimento de cliente da Quaglicar" loading="lazy" />

        <figure>
          <img src="imagens/feedback-5.jpg" alt="Depoimento de cliente da Quaglicar" loading="lazy" />
        </figure>
        <figure>
          <img src="imagens/feedback-6.jpg" alt="Depoimento de cliente da Quaglicar" loading="lazy" />
        </figure>
      </section>
    </main>

    <footer class="rodape-site">
      <p>
        feito com responsabilidade por
        <strong
          ><a
            href="https://thiagoribeirosilva.vercel.app"
